<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BEDM — Blue Environment Display Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      /* FIX: "wychodzi poza ekran" — never rely on 100vw (includes scrollbar
         gutter and is wrong inside a Tauri window that may not match the
         literal display resolution). Anchor to the actual layout viewport
         with 100%/100dvh on a fixed, zero-inset root instead. */
      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #020812;
        font-family: 'DM Sans', sans-serif;
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }
      #app {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100dvh;
        overflow: hidden;
      }
      /* Hide scrollbars */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
