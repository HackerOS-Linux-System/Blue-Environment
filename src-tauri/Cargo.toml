[package]
name = "blue-environment"
version = "0.2.0"
description = "Blue Environment"
authors = ["User"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "1", features = [] }

[dependencies]
tauri = { version = "1", features = ["shell-all", "fs-all", "path-all", "process-command-api"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
walkdir = "2"
regex = "1"
sysinfo = "0.30"
chrono = "0.4"
glob = "0.3"
dirs = "5.0"

[features]
custom-protocol = ["tauri/custom-protocol"]
